<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marcus Pereira — Portfólio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500;1,6..72,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbfaf7;
    --ink: #141414;
    --ink-soft: #4a4644;
    --ink-mute: #8c867f;
    --rule: #d9d3c8;
    --rule-soft: #eae5da;
    --accent: oklch(0.40 0.09 25);
    --accent-soft: oklch(0.40 0.09 25 / 0.10);
    --serif: "Newsreader", "Times New Roman", "Liberation Serif", serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --pad-x: clamp(28px, 6vw, 96px);
    --pad-top: clamp(88px, 13vh, 150px);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: var(--serif);
    font-optical-sizing: auto;
    font-size: 17.5px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern" 1, "liga" 1, "onum" 1;
  }
  ::selection { background: var(--accent); color: var(--bg); }
  a { color: inherit; text-decoration: none; }

  /* ── Navbar ── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 22px var(--pad-x);
    background: linear-gradient(to bottom, var(--bg) 60%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .nav::after {
    content: ""; position: absolute;
    left: var(--pad-x); right: var(--pad-x); bottom: 0;
    height: 1px; background: var(--rule-soft);
  }
  .nav-brand { font-style: italic; font-size: 19px; letter-spacing: 0.01em; cursor: default; }
  .nav-brand .amp { color: var(--ink-mute); margin: 0 6px; font-style: normal; }
  .nav-links { display: flex; gap: 30px; }
  .nav-link {
    position: relative; cursor: default;
    font-size: 16px; color: var(--ink-soft);
    padding: 4px 1px; transition: color .25s ease;
  }
  .nav-link .num {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-mute); margin-right: 8px;
    vertical-align: 1px; letter-spacing: 0.04em;
  }
  .nav-link::after {
    content: ""; position: absolute; left: 0; right: 100%;
    bottom: -2px; height: 1px; background: var(--accent);
    transition: right .35s cubic-bezier(.7,0,.2,1);
  }
  .nav-link:hover { color: var(--ink); }
  .nav-link:hover::after { right: 0; }
  .nav-link.active { color: var(--ink); }
  .nav-link.active::after { right: 0; }

  /* ── Page ── */
  .page {
    min-height: 100vh;
    padding: var(--pad-top) var(--pad-x) 160px;
    opacity: 0;
    animation: pageIn .55s cubic-bezier(.4,0,.15,1) forwards;
  }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Type utilities ── */
  .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); }
  .display { font-family: var(--serif); font-size: clamp(56px, 9vw, 132px); line-height: 0.96; letter-spacing: -0.02em; font-weight: 500; margin: 0; font-variation-settings: "opsz" 72; }
  .display .it { font-style: italic; color: var(--accent); }
  .lede { font-size: clamp(20px, 1.8vw, 26px); line-height: 1.45; color: var(--ink-soft); max-width: 52ch; font-style: italic; }

  /* ── Hamburger button (hidden on desktop) ── */
  .nav-burger {
    display: none;
    appearance: none; background: transparent; border: 0;
    padding: 8px; margin: -8px;
    cursor: pointer; color: var(--ink);
    flex-direction: column; gap: 5px; align-items: center; width: 40px;
  }
  .nav-burger span {
    display: block; width: 22px; height: 1.5px;
    background: currentColor;
    transition: transform .28s ease, opacity .28s ease;
    transform-origin: center;
  }
  .nav-burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
  .nav-burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .nav-burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

  /* ── Mobile backdrop ── */
  .nav-backdrop { display: none; }

  /* ── Mobile breakpoints ── */
  @media (max-width: 560px) {
    :root { --pad-top: clamp(68px, 11vh, 90px); }

    .nav { align-items: center; padding: 16px var(--pad-x); }
    .nav-brand { font-size: 16px; }
    .nav-brand .subtitle { display: none; }

    /* desktop links hidden; burger shown */
    .nav-links { display: none; }
    .nav-links.open {
      display: flex; flex-direction: column;
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--rule-soft);
      box-shadow: 0 8px 24px rgba(0,0,0,.07);
      padding: 8px var(--pad-x) 28px;
      gap: 0;
      animation: menuIn .22s cubic-bezier(.4,0,.15,1) forwards;
    }
    @keyframes menuIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: none; }
    }
    .nav-link {
      font-size: 20px; padding: 16px 0;
      border-bottom: 1px solid var(--rule-soft);
      display: flex; align-items: baseline; gap: 12px;
    }
    .nav-link:last-child { border-bottom: none; }
    .nav-link .num { display: inline; }
    .nav-link::after { display: none; }

    .nav-burger { display: flex; }

    .nav-backdrop {
      display: block;
      position: fixed; inset: 0; z-index: 48;
      background: rgba(0,0,0,.12);
      animation: bdIn .22s ease;
    }
    @keyframes bdIn { from { opacity: 0; } to { opacity: 1; } }
  }
  @media (max-width: 380px) {
    :root { --pad-x: 18px; }
  }

  /* ── Print (CV em PDF) ── */
  @media print {
    .nav, .twk-panel { display: none !important; }
    .page { padding-top: 24px; animation: none; opacity: 1; }
    body { font-size: 14px; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─── Tweaks panel ─────────────────────────────────────────────────────────────
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;box-sizing:border-box;width:100%;min-width:0;height:26px;padding:0 8px;border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg.dragging .twk-seg-thumb{transition:none}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2;overflow-wrap:anywhere}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}
  .twk-btn:hover{background:rgba(0,0,0,.88)}
  .twk-btn.secondary{background:rgba(0,0,0,.06);color:inherit}
  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}
  .twk-chips{display:flex;gap:6px}
  .twk-chip{position:relative;appearance:none;flex:1;min-width:0;height:46px;padding:0;border:0;border-radius:6px;overflow:hidden;cursor:default;box-shadow:0 0 0 .5px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.06);transition:transform .12s cubic-bezier(.3,.7,.4,1),box-shadow .12s}
  .twk-chip:hover{transform:translateY(-1px);box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}
  .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),0 2px 6px rgba(0,0,0,.15)}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues(prev => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clamp = React.useCallback(() => {
    const el = dragRef.current; if (!el) return;
    const maxR = Math.max(PAD, window.innerWidth - el.offsetWidth - PAD);
    const maxB = Math.max(PAD, window.innerHeight - el.offsetHeight - PAD);
    offsetRef.current = { x: Math.min(maxR, Math.max(PAD, offsetRef.current.x)), y: Math.min(maxB, Math.max(PAD, offsetRef.current.y)) };
    el.style.right = offsetRef.current.x + 'px'; el.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clamp();
    const ro = typeof ResizeObserver !== 'undefined' ? new ResizeObserver(clamp) : null;
    if (ro) ro.observe(document.documentElement); else window.addEventListener('resize', clamp);
    return () => { if (ro) ro.disconnect(); else window.removeEventListener('resize', clamp); };
  }, [open, clamp]);
  React.useEffect(() => {
    const onMsg = e => { const t = e?.data?.type; if (t === '__activate_edit_mode') setOpen(true); else if (t === '__deactivate_edit_mode') setOpen(false); };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = e => {
    const el = dragRef.current; if (!el) return;
    const r = el.getBoundingClientRect(), sx = e.clientX, sy = e.clientY;
    const sr = window.innerWidth - r.right, sb = window.innerHeight - r.bottom;
    const move = ev => { offsetRef.current = { x: sr - (ev.clientX - sx), y: sb - (ev.clientY - sy) }; clamp(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl"><span>{label}</span>{value != null && <span className="twk-val">{value}</span>}</div>
      {children}
    </div>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'} role="switch" aria-checked={!!value} onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={e => onChange(e.target.value)}>
        {options.map(o => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}
      </select>
    </TweakRow>
  );
}
function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value); valueRef.current = value;
  const labelLen = o => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  if (maxLen > ({ 2: 16, 3: 10 }[options.length] ?? 0)) {
    const resolve = s => { const m = options.find(o => String(typeof o === 'object' ? o.value : o) === s); return m === undefined ? s : typeof m === 'object' ? m.value : m; };
    return <TweakSelect label={label} value={value} options={options} onChange={s => onChange(resolve(s))} />;
  }
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  const segAt = clientX => { const r = trackRef.current.getBoundingClientRect(); const i = Math.floor(((clientX - r.left - 2) / (r.width - 4)) * n); return opts[Math.max(0, Math.min(n - 1, i))].value; };
  const onPointerDown = e => {
    setDragging(true);
    const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
    const move = ev => { if (!trackRef.current) return; const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
  };
  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown} className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map(o => <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>)}
      </div>
    </TweakRow>
  );
}
function __twkIsLight(hex) {
  const h = String(hex).replace('#',''); const x = h.length === 3 ? h.replace(/./g, c => c+c) : h.padEnd(6,'0');
  const n = parseInt(x.slice(0,6),16); if (Number.isNaN(n)) return true;
  const r=(n>>16)&255, g=(n>>8)&255, b=n&255; return r*299+g*587+b*114 > 148000;
}
const TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} /></svg>
);
function TweakColor({ label, value, options, onChange }) {
  if (!options?.length) return (
    <div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><input type="color" className="twk-swatch" value={value} onChange={e => onChange(e.target.value)} /></div>
  );
  const key = o => String(JSON.stringify(o)).toLowerCase(); const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => { const colors = Array.isArray(o) ? o : [o]; const [hero, ...rest] = colors; const on = key(o) === cur;
          return <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on?'1':'0'} style={{ background: hero }} onClick={() => onChange(o)}>{on && <TwkCheck light={__twkIsLight(hero)} />}</button>; })}
      </div>
    </TweakRow>
  );
}
function TweakButton({ label, onClick, secondary = false }) {
  return <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'} onClick={onClick}>{label}</button>;
}

// ─── Resume ───────────────────────────────────────────────────────────────────
function Resume({ density, showPhoto }) {
  const gap = density === 'spacious' ? 72 : density === 'compact' ? 28 : 44;

  return (
    <div className="page">
      <style>{`
        .resume-grid { display:grid; grid-template-columns:1fr; gap:80px; }
        .resume-hero {
          display:grid;
          grid-template-columns:${showPhoto ? 'minmax(0,1fr) 280px' : '1fr'};
          gap:64px; align-items:end;
          padding-bottom:64px; border-bottom:1px solid var(--rule-soft);
        }
        .resume-hero .meta { display:flex; flex-direction:column; gap:18px; padding-bottom:10px; }
        .resume-hero .meta .row { display:grid; grid-template-columns:100px 1fr; gap:20px; align-items:baseline; padding:12px 0; border-top:1px solid var(--rule-soft); font-size:15px; }
        .resume-hero .meta .row:last-child { border-bottom:1px solid var(--rule-soft); }
        .resume-hero .meta .k { font-family:var(--mono); font-size:10.5px; color:var(--ink-mute); letter-spacing:0.12em; text-transform:uppercase; }
        .resume-hero .meta .v { color:var(--ink); font-style:italic; }
        .photo { aspect-ratio:4/5; background:var(--rule-soft); overflow:hidden; }
        .photo img { width:100%; height:100%; object-fit:cover; display:block; filter:grayscale(100%) contrast(1.02); transition:filter .4s ease; }
        .photo:hover img { filter:grayscale(0%); }

  );

// ─── App ─────────────────────────────────────────────────────────────────────
const PAGES = [
  { id: 'cv',       num: '01', label: 'Currículo' },
  { id: 'projects', num: '02', label: 'Projetos'  },
  { id: 'contact',  num: '03', label: 'Contato'   },
];

const TWEAKS = {
  accent:     '#7a1f1f',
  density:    'regular',
  showPhoto:  true,
  background: '#fbfaf7',
};

function hexToRgba(hex, a) {
  const h = hex.replace('#','');
  const n = h.length === 3 ? h.split('').map(c => c+c).join('') : h;
  const r = parseInt(n.slice(0,2),16), g = parseInt(n.slice(2,4),16), b = parseInt(n.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

function App() {
  const [t, setTweak] = useTweaks(TWEAKS);
  const [pageId, setPageId] = React.useState(() => {
    const h = (location.hash || '').replace('#','');
    return PAGES.find(p => p.id === h) ? h : 'cv';
  });
  const [menuOpen, setMenuOpen] = React.useState(false);

  React.useEffect(() => {
    const onHash = () => {
      const h = (location.hash || '').replace('#','');
      if (PAGES.find(p => p.id === h)) setPageId(h);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Close menu when resizing back to desktop
  React.useEffect(() => {
    const onResize = () => { if (window.innerWidth > 560) setMenuOpen(false); };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // Prevent body scroll while menu is open
  React.useEffect(() => {
    document.body.style.overflow = menuOpen ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [menuOpen]);

  const go = id => {
    if (id !== pageId) {
      location.hash = id; setPageId(id);
      window.scrollTo({ top: 0, behavior: 'instant' });
    }
    setMenuOpen(false);
  };

  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--accent', t.accent);
    r.style.setProperty('--accent-soft', hexToRgba(t.accent, 0.10));
    r.style.setProperty('--bg', t.background);
  }, [t.accent, t.background]);

  return (
    <div>
      {menuOpen && <div className="nav-backdrop" onClick={() => setMenuOpen(false)} />}
      <nav className="nav">
        <div className="nav-brand">
          Marcus Pereira
          <span className="amp subtitle">·</span>
          <span className="subtitle" style={{color:'var(--ink-mute)'}}>portfólio MMXXVI</span>
        </div>
        <div className={'nav-links' + (menuOpen ? ' open' : '')}>
          {PAGES.map(p => (
            <a key={p.id} href={'#'+p.id}
               onClick={e => { e.preventDefault(); go(p.id); }}
               className={'nav-link ' + (pageId === p.id ? 'active' : '')}>
              <span className="num">{p.num}</span>{p.label}
            </a>
          ))}
        </div>
        <button
          className={'nav-burger' + (menuOpen ? ' open' : '')}
          aria-label={menuOpen ? 'Fechar menu' : 'Abrir menu'}
          aria-expanded={menuOpen}
          onClick={() => setMenuOpen(m => !m)}
        >
          <span /><span /><span />
        </button>
      </nav>

      <main key={pageId}>
        {pageId === 'cv'       && <Resume   density={t.density} showPhoto={t.showPhoto} />}
        {pageId === 'projects' && <Projects />}
        {pageId === 'contact'  && <Contact />}
      </main>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Cor de acento" />
        <TweakColor label="Acento" value={t.accent}
          options={['#7a1f1f','#1f3a7a','#2f5d3a','#b58a2c','#1a1a1a']}
          onChange={v => setTweak('accent', v)} />
        <TweakSection label="Fundo" />
        <TweakColor label="Papel" value={t.background}
          options={['#fbfaf7','#ffffff','#f3eee2','#ece7d8']}
          onChange={v => setTweak('background', v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Densidade" value={t.density}
          options={['compact','regular','spacious']}
          onChange={v => setTweak('density', v)} />
        <TweakToggle label="Mostrar retrato" value={t.showPhoto}
          onChange={v => setTweak('showPhoto', v)} />
        <TweakSection label="Navegação" />
        <TweakButton label="Ir para Currículo" onClick={() => go('cv')} />
        <TweakButton label="Ir para Projetos"  onClick={() => go('projects')} />
        <TweakButton label="Ir para Contato"   onClick={() => go('contact')} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
